<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpamGuard AI - Login</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-50 font-sans">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-10 py-4 bg-white shadow-sm">
    <h1 class="font-bold text-lg">🛡️ SpamGuard AI</h1>

    <div class="space-x-6">
        <a href="#" class="text-gray-500 hover:text-black">Support</a>
        <button class="bg-black text-white px-4 py-2 rounded-lg"
            onclick="window.location.href='dashboard.html'">
            Sign Up
        </button>
    </div>
</nav>

<!-- MAIN LOGIN -->
<div class="flex items-center justify-center h-[80vh]">

    <div class="bg-white p-8 rounded-2xl shadow-md w-[400px] text-center">

        <!-- ICON -->
        <div class="bg-gray-100 w-12 h-12 mx-auto rounded-xl flex items-center justify-center mb-4">
            <i class="fas fa-lock text-gray-600"></i>
        </div>

        <!-- TITLE -->
        <h2 class="text-xl font-bold mb-1">Welcome Back</h2>
        <p class="text-gray-500 text-sm mb-6">Log in to manage your spam filters</p>

        <!-- FORM -->
        <form id="login-form" class="space-y-4">

            <!-- EMAIL -->
            <input id="email-input" type="email"
                placeholder="name@company.com"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black"
                required>

            <!-- PASSWORD -->
            <input id="password-input" type="password"
                placeholder="••••••••"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-black"
                required>

            <!-- REMEMBER -->
            <div class="flex items-center text-sm text-gray-500">
                <input type="checkbox" class="mr-2">
                Keep me signed in
            </div>

            <!-- BUTTON -->
            <button type="submit"
                class="w-full bg-black text-white py-3 rounded-xl hover:opacity-90 transition">
                Sign In →
            </button>

        </form>

    </div>

</div>

<!-- SCRIPT -->
<script>
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("email-input").value;
    let password = document.getElementById("password-input").value;

    if (email && password) {
        window.location.href = "dashboard.html";
    }
});
</script>

</body>
</html>
